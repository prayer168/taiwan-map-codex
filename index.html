<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="台灣 3D 立體地景，以無人機視角自由飛越各縣市知名地標、山脈、海岸與城市。" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="台灣 3D 地景飛行" />
    <meta property="og:title" content="台灣 3D 地景飛行" />
    <meta property="og:description" content="用無人機視角探索台灣各縣市代表地景。" />
    <title>台灣 3D 地景飛行</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="flight-app" aria-label="台灣 3D 地景飛行互動體驗">
      <canvas id="taiwanScene" aria-label="台灣 3D 立體地景"></canvas>

      <header class="hud hero-hud">
        <p class="eyebrow">Taiwan Drone Atlas</p>
        <h1>台灣 3D 地景飛行</h1>
        <p>以無人機視角越過中央山脈、海岸線與城市地標，點選縣市或直接飛行巡覽全台。</p>
      </header>

      <section class="hud drone-console" aria-label="無人機控制台">
        <div class="status-grid">
          <div>
            <span>目前焦點</span>
            <strong id="focusName">自由飛行</strong>
          </div>
          <div>
            <span>高度</span>
            <strong id="altitudeValue">0 m</strong>
          </div>
          <div>
            <span>速度</span>
            <strong id="speedValue">1.0x</strong>
          </div>
        </div>
        <div class="control-row">
          <button id="tourButton" type="button" title="自動巡航">巡航</button>
          <button id="homeButton" type="button" title="返回全台視角">全台</button>
          <button id="nightButton" type="button" title="切換日夜光線">日夜</button>
        </div>
        <label class="range-control" for="speedRange">
          <span>飛行速度</span>
          <input id="speedRange" type="range" min="0.4" max="2.4" value="1" step="0.1" />
        </label>
        <p class="hint">滑鼠拖曳環視，滾輪升降；方向鍵平移，Q/E 調整高度。</p>
      </section>

      <section class="hud city-panel" aria-label="縣市地景列表">
        <div class="panel-head">
          <h2>縣市地景</h2>
          <select id="regionFilter" aria-label="篩選區域">
            <option value="all">全台</option>
            <option value="north">北部</option>
            <option value="central">中部</option>
            <option value="south">南部</option>
            <option value="east">東部</option>
            <option value="islands">離島</option>
          </select>
        </div>
        <div id="cityList" class="city-list"></div>
      </section>

      <aside class="hud place-detail" aria-live="polite">
        <p id="placeCounty" class="eyebrow">DRONE VIEW</p>
        <h2 id="placeTitle">自由瀏覽台灣</h2>
        <p id="placeText">選擇縣市地標，鏡頭會飛到對應位置。每個地標以立體模型呈現，適合課堂導覽、地理介紹與台灣印象探索。</p>
      </aside>

      <div id="loadingState" class="loading-state">正在生成台灣立體地景...</div>
    </main>

    <script src="./js/app.js" type="module"></script>
  </body>
</html>
